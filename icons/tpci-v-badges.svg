<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" role="img">
  <title>TPCI-V badge variants</title>
  <desc>Full badge set for TPCI-V verification states: verified, active, removed, remediated</desc>

  <defs>
    <!-- Reusable shield symbol -->
    <symbol id="shield" viewBox="0 0 20 24">
      <path d="M10 0 L20 4 L20 13 Q20 20 10 24 Q0 20 0 13 L0 4 Z"
            fill="currentColor" stroke="none"/>
      <text x="10" y="17"
            font-family="system-ui, sans-serif"
            font-size="11"
            font-weight="500"
            text-anchor="middle"
            fill="#5DCAA5">V</text>
    </symbol>
  </defs>

  <!-- Badge 1: TPCI-V Verified (neutral / base) -->
  <g transform="translate(0, 0)">
    <rect x="0" y="0" width="180" height="40" rx="6"
          fill="#04342C" stroke="#1D9E75" stroke-width="1.5"/>
    <rect x="6" y="8" width="20" height="24" rx="2" fill="#085041"/>
    <use href="#shield" x="6" y="8" width="20" height="24" color="#085041"/>
    <text x="38" y="17"
          font-family="system-ui, sans-serif"
          font-size="13" font-weight="500"
          fill="#5DCAA5" letter-spacing="0.5">TPCI-V Verified</text>
    <text x="38" y="31"
          font-family="system-ui, sans-serif"
          font-size="10" fill="#1D9E75">tpc.institute</text>
  </g>

  <!-- Badge 2: Active (malicious, still live) -->
  <g transform="translate(0, 60)">
    <rect x="0" y="0" width="164" height="40" rx="6"
          fill="#04342C" stroke="#E24B4A" stroke-width="1.5"/>
    <rect x="6" y="8" width="20" height="24" rx="2" fill="#501313"/>
    <use href="#shield" x="6" y="8" width="20" height="24" color="#501313"/>
    <text x="38" y="17"
          font-family="system-ui, sans-serif"
          font-size="13" font-weight="500"
          fill="#F09595" letter-spacing="0.5">TPCI-V Active</text>
    <text x="38" y="31"
          font-family="system-ui, sans-serif"
          font-size="10" fill="#E24B4A">confirmed malicious</text>
  </g>

  <!-- Badge 3: Removed -->
  <g transform="translate(0, 120)">
    <rect x="0" y="0" width="168" height="40" rx="6"
          fill="#04342C" stroke="#3B6D11" stroke-width="1.5"/>
    <rect x="6" y="8" width="20" height="24" rx="2" fill="#173404"/>
    <use href="#shield" x="6" y="8" width="20" height="24" color="#173404"/>
    <text x="38" y="17"
          font-family="system-ui, sans-serif"
          font-size="13" font-weight="500"
          fill="#97C459" letter-spacing="0.5">TPCI-V Removed</text>
    <text x="38" y="31"
          font-family="system-ui, sans-serif"
          font-size="10" fill="#639922">confirmed removed</text>
  </g>

  <!-- Badge 4: Remediated -->
  <g transform="translate(0, 180)">
    <rect x="0" y="0" width="180" height="40" rx="6"
          fill="#04342C" stroke="#EF9F27" stroke-width="1.5"/>
    <rect x="6" y="8" width="20" height="24" rx="2" fill="#412402"/>
    <use href="#shield" x="6" y="8" width="20" height="24" color="#412402"/>
    <text x="38" y="17"
          font-family="system-ui, sans-serif"
          font-size="13" font-weight="500"
          fill="#FAC775" letter-spacing="0.5">TPCI-V Remediated</text>
    <text x="38" y="31"
          font-family="system-ui, sans-serif"
          font-size="10" fill="#EF9F27">supply chain victim</text>
  </g>

  <!-- Light mode pill (for use on light backgrounds) -->
  <g transform="translate(200, 0)">
    <rect x="0" y="0" width="152" height="32" rx="16"
          fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
    <path d="M10 5 L18 8 L18 16 Q18 22 10 24 Q2 22 2 16 L2 8 Z"
          fill="#085041" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="10" y="17"
          font-family="system-ui, sans-serif"
          font-size="7" font-weight="500"
          text-anchor="middle" fill="#5DCAA5">V</text>
    <text x="90" y="21"
          font-family="system-ui, sans-serif"
          font-size="12" font-weight="500"
          text-anchor="middle" fill="#085041">TPCI-V verified</text>
  </g>

  <!-- Light mode pill: active -->
  <g transform="translate(200, 46)">
    <rect x="0" y="0" width="136" height="32" rx="16"
          fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.75"/>
    <path d="M10 5 L18 8 L18 16 Q18 22 10 24 Q2 22 2 16 L2 8 Z"
          fill="#791F1F" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="10" y="17"
          font-family="system-ui, sans-serif"
          font-size="7" font-weight="500"
          text-anchor="middle" fill="#F09595">V</text>
    <text x="78" y="21"
          font-family="system-ui, sans-serif"
          font-size="12" font-weight="500"
          text-anchor="middle" fill="#791F1F">TPCI-V active</text>
  </g>

  <!-- Light mode pill: removed -->
  <g transform="translate(200, 92)">
    <rect x="0" y="0" width="148" height="32" rx="16"
          fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.75"/>
    <path d="M10 5 L18 8 L18 16 Q18 22 10 24 Q2 22 2 16 L2 8 Z"
          fill="#173404" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="10" y="17"
          font-family="system-ui, sans-serif"
          font-size="7" font-weight="500"
          text-anchor="middle" fill="#97C459">V</text>
    <text x="84" y="21"
          font-family="system-ui, sans-serif"
          font-size="12" font-weight="500"
          text-anchor="middle" fill="#27500A">TPCI-V removed</text>
  </g>

  <!-- Light mode pill: remediated -->
  <g transform="translate(200, 138)">
    <rect x="0" y="0" width="168" height="32" rx="16"
          fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
    <path d="M10 5 L18 8 L18 16 Q18 22 10 24 Q2 22 2 16 L2 8 Z"
          fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
    <text x="10" y="17"
          font-family="system-ui, sans-serif"
          font-size="7" font-weight="500"
          text-anchor="middle" fill="#FAC775">V</text>
    <text x="94" y="21"
          font-family="system-ui, sans-serif"
          font-size="12" font-weight="500"
          text-anchor="middle" fill="#633806">TPCI-V remediated</text>
  </g>

</svg>
