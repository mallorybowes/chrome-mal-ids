title: Malicious Chrome/Edge Extension Detected (part 1/3)
id: chrome-mal-ids-sigma_part1
status: experimental
description: >
    Detects the presence or activity of a known malicious Chrome or Edge browser
    extension based on the Malicious Chrome Extension IOC Database
    (https://github.com/mallorybowes/chrome-mal-ids). Covers 1356 confirmed malicious extension IDs across
    30+ campaigns including credential theft, data exfiltration, browser hijacking,
    click fraud, and supply chain attacks via ownership transfer.
references:
    - https://github.com/mallorybowes/chrome-mal-ids
    - https://github.com/mallorybowes/chrome-mal-ids/blob/master/STATS.md
author: Malicious Chrome Extension IOC Database (@mallorybowes)
date: 2026-05-22
modified: 2026-05-22
tags:
    - attack.collection
    - attack.t1176
    - attack.credential_access
    - attack.t1539
    - attack.exfiltration
